<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="EduQuiz - Interactive Educational Game inspired by Kahoot!" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>EduQuiz — Learn. Play. Win.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- ============================================
     ANIMATED BACKGROUND
     ============================================ -->
<canvas id="bg-canvas"></canvas>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<!-- ============================================
     APP WRAPPER
     ============================================ -->
<div id="app">
  <!-- ==================
       GLOBAL HEADER
       ================== -->
  <header class="app-header" id="app-header">
    <div class="app-logo" onclick="showScreen('home')">
      <div class="logo-icon">E</div>
      <span class="logo-text" data-i18n="appName">EduQuiz</span>
    </div>
    <div class="header-right">
      <div class="user-xp-badge" id="header-xp-badge">
        <span>⚡</span>
        <span>Level 1</span>
        <span style="color:var(--text-muted)">|</span>
        <span>0 XP</span>
      </div>
      <button class="btn btn-ghost btn-icon" onclick="showScreen('settings')" title="Settings">⚙️</button>
    </div>
  </header>
  <!-- ============================================
       SCREEN: HOME
       ============================================ -->
  <section id="screen-home" class="screen">
    <div id="home-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: QUIZ LIST (My Quizzes)
       ============================================ -->
  <section id="screen-quiz-list" class="screen">
    <div id="quiz-list-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: CREATE QUIZ
       ============================================ -->
  <section id="screen-create" class="screen">
    <div id="create-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: PLAY SELECT
       ============================================ -->
  <section id="screen-play-select" class="screen">
    <div id="play-select-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: PLAY
       ============================================ -->
  <section id="screen-play" class="screen">
    <div id="play-content" style="flex:1">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: RESULT
       ============================================ -->
  <section id="screen-result" class="screen">
    <div id="result-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: LEADERBOARD
       ============================================ -->
  <section id="screen-leaderboard" class="screen">
    <div id="leaderboard-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: STATISTICS
       ============================================ -->
  <section id="screen-stats" class="screen">
    <div id="stats-content">
      <!-- Rendered by JS -->
    </div>
  </section>
  <!-- ============================================
       SCREEN: SETTINGS
       ============================================ -->
  <section id="screen-settings" class="screen">
    <div id="settings-content">
      <!-- Rendered by JS -->
    </div>
  </section>
</div><!-- /#app -->
<!-- ============================================
     MODAL OVERLAY
     ============================================ -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal" class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Modal</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>
<!-- ============================================
     TOAST CONTAINER
     ============================================ -->
<div id="toast-container"></div>
<!-- ============================================
     SCRIPT
     ============================================ -->
<script src="script.js"></script>
</body>
</html>
